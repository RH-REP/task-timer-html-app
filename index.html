<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="app" aria-label="Task timer app">
      <div class="timer-panel" id="timerPanel" data-mode="down">
        <div class="topbar">
          <h1>Task Timer</h1>
        </div>

        <div class="timer-body">
          <div class="setup-panel">
            <div class="mode-row" aria-label="Timer mode">
              <button type="button" data-mode="down" aria-pressed="true">Countdown</button>
              <button type="button" data-mode="up" aria-pressed="false">Count up</button>
            </div>

            <div class="task-row">
              <div>
                <label for="taskName">Task</label>
                <input id="taskName" type="text" value="Deep work" autocomplete="off">
              </div>
              <div class="goal-field">
                <label for="minutes" id="minutesLabel">Goal minutes</label>
                <input id="minutes" type="number" min="1" max="240" value="25">
              </div>
            </div>
          </div>

          <div class="timer-stage">
            <div class="clock-wrap">
              <div class="clock" id="clock" aria-live="polite">
                <div>
                  <div class="time" id="time">25:00</div>
                  <div class="subtime" id="subtime">25 minutes planned</div>
                </div>
              </div>
            </div>

            <div class="start-meta" id="startMeta">Start time will appear when the timer runs.</div>

            <div class="controls" aria-label="Timer controls">
              <button class="primary" id="startPause" type="button">Start</button>
              <button id="reset" type="button">Reset</button>
              <button id="finish" type="button">Finish</button>
            </div>
          </div>
        </div>
      </div>

      <aside class="side-panel">
        <div class="side-head">
          <h2>History</h2>
          <div class="history-tools" aria-label="History file tools">
            <button class="tool-button" id="exportCsv" type="button">Export CSV</button>
            <button class="tool-button" id="importCsv" type="button">Import CSV</button>
            <input id="csvFile" type="file" accept=".csv,text/csv" hidden>
          </div>
        </div>
        <div class="import-note" id="importNote"></div>
        <a class="download-link" id="downloadCsv" href="#" download>Download CSV</a>

        <div class="date-nav" aria-label="History day">
          <button id="prevDay" type="button" aria-label="Previous day">&lt;</button>
          <div class="date-label" id="dateLabel">Today</div>
          <button id="nextDay" type="button" aria-label="Next day">&gt;</button>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <strong id="sessionCount">0</strong>
            <span>Sessions</span>
          </div>
          <div class="metric">
            <strong id="totalMinutes">0</strong>
            <span>Minutes</span>
          </div>
        </div>

        <div class="history" id="history" aria-label="Completed task history">
          <div class="empty">Finished tasks will appear here.</div>
        </div>
      </aside>
    </section>
  </main>

  <div class="edit-popover" id="editModal" hidden></div>

  <script>
    const timerPanel = document.querySelector("#timerPanel");
    const sidePanel = document.querySelector(".side-panel");
    const editModal = document.querySelector("#editModal");
    const taskName = document.querySelector("#taskName");
    const minutesInput = document.querySelector("#minutes");
    const minutesLabel = document.querySelector("#minutesLabel");
    const timeDisplay = document.querySelector("#time");
    const subtime = document.querySelector("#subtime");
    const clock = document.querySelector("#clock");
    const startMeta = document.querySelector("#startMeta");
    const startPause = document.querySelector("#startPause");
    const resetButton = document.querySelector("#reset");
    const finishButton = document.querySelector("#finish");
    const exportCsv = document.querySelector("#exportCsv");
    const importCsv = document.querySelector("#importCsv");
    const csvFile = document.querySelector("#csvFile");
    const importNote = document.querySelector("#importNote");
    const downloadCsv = document.querySelector("#downloadCsv");
    const prevDay = document.querySelector("#prevDay");
    const nextDay = document.querySelector("#nextDay");
    const dateLabel = document.querySelector("#dateLabel");
    const history = document.querySelector("#history");
    const sessionCount = document.querySelector("#sessionCount");
    const totalMinutes = document.querySelector("#totalMinutes");
    const modeButtons = document.querySelectorAll("[data-mode]");

    let mode = "down";
    let duration = 25 * 60;
    let elapsed = 0;
    let running = false;
    let timerId = null;
    let sessionStartedAt = null;
    let editingId = null;
    let selectedDate = new Date();
    let exportUrl = null;
    let completed = loadSavedLog();
    let scheduled = loadSavedSchedule();
    let scheduleDrag = null;
    let resizeDrag = null;
    let moveDrag = null;
    let pendingCreatedEntry = null;
    let suppressBlockClick = false;
    let lockedTimerPanelHeight = null;
    let editAnchor = null;
    const moveDragThreshold = 6;
    const createDragThreshold = 6;

    function clampMinutes(value) {
      const number = Number.parseInt(value, 10);
      if (Number.isNaN(number)) return 25;
      return Math.min(240, Math.max(1, number));
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
      const secs = (seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function formatClockTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatCsvDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString([], {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function formatRange(start, end) {
      const startTime = formatClockTime(start);
      const endTime = formatClockTime(end);
      return startTime && endTime ? `${startTime} - ${endTime}` : startTime || endTime || "Time not set";
    }

    function dateKey(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function selectedDateKey() {
      return dateKey(selectedDate);
    }

    function changeSelectedDate(offset) {
      const next = new Date(selectedDate);
      next.setDate(next.getDate() + offset);
      selectedDate = next;
      editingId = null;
      editAnchor = null;
      renderLog();
    }

    function formatDateLabel(date) {
      const todayKey = dateKey(new Date());
      const key = dateKey(date);
      const dateText = date.toLocaleDateString([], {
        weekday: "short",
        month: "short",
        day: "numeric"
      });
      return key === todayKey ? `Today, ${dateText}` : dateText;
    }

    function minutesSinceMidnight(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 0;
      return date.getHours() * 60 + date.getMinutes();
    }

    function toDateTimeLocal(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 16);
    }

    function fromDateTimeLocal(value) {
      if (!value) return new Date().toISOString();
      return new Date(value).toISOString();
    }

    function addMinutesToIso(startValue, minutesValue) {
      const start = new Date(startValue);
      const minutes = Math.max(1, Number.parseInt(minutesValue, 10) || 1);
      if (Number.isNaN(start.getTime())) return new Date().toISOString();
      return new Date(start.getTime() + minutes * 60000).toISOString();
    }

    function isoForSelectedDayMinute(minutes) {
      const date = new Date(selectedDate);
      date.setHours(0, Math.max(0, Math.min(1439, minutes)), 0, 0);
      return date.toISOString();
    }

    function syncSidePanelHeight() {
      if (window.matchMedia("(max-width: 820px)").matches) {
        lockedTimerPanelHeight = null;
        timerPanel.style.height = "";
        sidePanel.style.height = "";
        return;
      }
      if (!lockedTimerPanelHeight) {
        timerPanel.style.height = "";
        lockedTimerPanelHeight = timerPanel.offsetHeight;
      }
      timerPanel.style.height = `${lockedTimerPanelHeight}px`;
      sidePanel.style.height = `${lockedTimerPanelHeight}px`;
    }

    function normalizeEntry(entry) {
      const endedAt = entry.endedAt || new Date().toISOString();
      const minutes = Math.max(1, Number.parseInt(entry.minutes, 10) || 1);
      const startedAt = entry.startedAt || new Date(new Date(endedAt).getTime() - minutes * 60000).toISOString();
      return {
        id: entry.id || crypto.randomUUID(),
        task: entry.task || "Untitled task",
        mode: entry.mode || "down",
        minutes,
        startedAt,
        endedAt,
        note: entry.note || ""
      };
    }

    function normalizeSchedule(entry) {
      const endedAt = entry.endedAt || new Date().toISOString();
      const minutes = Math.max(1, Number.parseInt(entry.minutes, 10) || 1);
      const startedAt = entry.startedAt || new Date(new Date(endedAt).getTime() - minutes * 60000).toISOString();
      return {
        id: entry.id || crypto.randomUUID(),
        task: entry.task || "Planned task",
        minutes,
        startedAt,
        endedAt,
        note: entry.note || ""
      };
    }

    function entryKey(entry) {
      return [
        entry.task.trim().toLowerCase(),
        new Date(entry.startedAt).toISOString(),
        entry.minutes
      ].join("|");
    }

    function saveLog() {
      localStorage.setItem("taskTimerLog", JSON.stringify(completed));
    }

    function saveSchedule() {
      localStorage.setItem("taskTimerSchedule", JSON.stringify(scheduled));
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, '""')}"`;
    }

    function buildCsv() {
      const headers = [
        "Type",
        "Date",
        "Start",
        "Finish",
        "Minutes",
        "Hours",
        "Mode",
        "Task",
        "Note",
        "Started ISO",
        "Finished ISO"
      ];
      const rows = [
        ...completed.map((entry) => ({ ...entry, type: "Completed" })),
        ...scheduled.map((entry) => ({ ...entry, type: "Schedule", mode: "plan" }))
      ]
        .sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt))
        .map((entry) => [
          entry.type,
          formatCsvDate(entry.startedAt),
          formatClockTime(entry.startedAt),
          formatClockTime(entry.endedAt),
          entry.minutes,
          (entry.minutes / 60).toFixed(2),
          entry.type === "Schedule" ? "Planned" : entry.mode === "manual" ? "Manual" : entry.mode === "up" ? "Count up" : "Countdown",
          entry.task,
          entry.note || "",
          entry.startedAt,
          entry.endedAt
        ]);
      return "\ufeff" + [headers, ...rows].map((row) => row.map(csvCell).join(",")).join("\r\n");
    }

    function exportHistoryCsv() {
      const csv = buildCsv();
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const filename = `task-history-${dateKey(new Date())}.csv`;
      if (exportUrl) URL.revokeObjectURL(exportUrl);
      exportUrl = URL.createObjectURL(blob);
      downloadCsv.href = exportUrl;
      downloadCsv.download = filename;
      downloadCsv.textContent = `Download ${filename}`;
      downloadCsv.dataset.ready = "true";
      downloadCsv.click();
      importNote.textContent = `CSV ready: ${completed.length} task${completed.length === 1 ? "" : "s"} and ${scheduled.length} plan${scheduled.length === 1 ? "" : "s"} included.`;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const source = text.replace(/^\ufeff/, "");
      for (let index = 0; index < source.length; index += 1) {
        const char = source[index];
        const next = source[index + 1];
        if (quoted) {
          if (char === '"' && next === '"') {
            cell += '"';
            index += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            cell += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          row.push(cell);
          cell = "";
        } else if (char === "\n") {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else if (char !== "\r") {
          cell += char;
        }
      }
      row.push(cell);
      rows.push(row);
      return rows.filter((items) => items.some((item) => item.trim() !== ""));
    }

    function rowToImportItem(headers, row) {
      const value = (name) => row[headers.indexOf(name)] || "";
      const typeText = value("Type").toLowerCase();
      const startedIso = value("Started ISO");
      const finishedIso = value("Finished ISO");
      const minutes = Math.max(1, Number.parseInt(value("Minutes"), 10) || 1);
      const startedAt = startedIso || new Date().toISOString();
      const endedAt = finishedIso || addMinutesToIso(startedAt, minutes);
      const modeText = value("Mode").toLowerCase();
      if (typeText.includes("schedule") || typeText.includes("plan") || modeText.includes("plan")) {
        return {
          type: "schedule",
          entry: normalizeSchedule({
            id: crypto.randomUUID(),
            task: value("Task") || "Imported plan",
            note: value("Note"),
            minutes,
            startedAt,
            endedAt
          })
        };
      }
      return {
        type: "completed",
        entry: normalizeEntry({
          id: crypto.randomUUID(),
          task: value("Task") || "Imported task",
          mode: modeText.includes("manual") ? "manual" : modeText.includes("up") ? "up" : "down",
          note: value("Note"),
          minutes,
          startedAt,
          endedAt
        })
      };
    }

    function importHistoryCsv(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const rows = parseCsv(String(reader.result || ""));
          const headers = rows.shift()?.map((header) => header.trim()) || [];
          if (!headers.includes("Task") || !headers.includes("Started ISO") || !headers.includes("Minutes")) {
            importNote.textContent = "Import skipped: CSV needs Task, Minutes, and Started ISO columns.";
            return;
          }
          const existingCompleted = new Set(completed.map(entryKey));
          const existingScheduled = new Set(scheduled.map(entryKey));
          const importedCompleted = [];
          const importedScheduled = [];
          rows.map((row) => rowToImportItem(headers, row)).forEach((item) => {
            const key = entryKey(item.entry);
            if (item.type === "schedule") {
              if (existingScheduled.has(key)) return;
              existingScheduled.add(key);
              importedScheduled.push(item.entry);
              return;
            }
            if (existingCompleted.has(key)) return;
            existingCompleted.add(key);
            importedCompleted.push(item.entry);
          });
          completed = [...completed, ...importedCompleted].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt)).slice(0, 300);
          scheduled = [...scheduled, ...importedScheduled].sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt)).slice(-300);
          const newestImport = importedCompleted[0] || importedScheduled[0];
          if (newestImport) selectedDate = new Date(newestImport.startedAt);
          saveLog();
          saveSchedule();
          renderLog({ preserveScroll: true });
          importNote.textContent = `Imported ${importedCompleted.length} task${importedCompleted.length === 1 ? "" : "s"} and ${importedScheduled.length} plan${importedScheduled.length === 1 ? "" : "s"}.`;
        } catch {
          importNote.textContent = "Import failed: CSV could not be read.";
        } finally {
          csvFile.value = "";
        }
      });
      reader.readAsText(file);
    }

    function setGoalFromInput() {
      const minutes = clampMinutes(minutesInput.value);
      minutesInput.value = minutes;
      duration = minutes * 60;
      if (mode === "down") elapsed = Math.min(elapsed, duration);
      updateDisplay();
    }

    function setMode(nextMode) {
      if (mode === nextMode) return;
      stopTimer();
      mode = nextMode;
      elapsed = 0;
      sessionStartedAt = null;
      timerPanel.dataset.mode = mode;
      modeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
      });
      minutesLabel.textContent = "Goal minutes";
      updateDisplay();
      syncSidePanelHeight();
    }

    function updateDisplay() {
      const isOvertime = mode === "down" && elapsed > duration;
      const visibleSeconds = mode === "down"
        ? (isOvertime ? elapsed - duration : Math.max(0, duration - elapsed))
        : elapsed;
      const progress = mode === "down"
        ? Math.min(360, duration === 0 ? 0 : (elapsed / duration) * 360)
        : Math.min(360, (elapsed / duration) * 360);

      const displayTime = isOvertime ? `+${formatTime(visibleSeconds)}` : formatTime(visibleSeconds);
      timeDisplay.textContent = displayTime;
      clock.style.setProperty("--progress", `${progress}deg`);
      if (mode === "down") {
        if (isOvertime) {
          const minutesOver = Math.floor(visibleSeconds / 60);
          subtime.textContent = `${minutesOver} minute${minutesOver === 1 ? "" : "s"} over target`;
        } else {
          const minutesLeft = Math.ceil(visibleSeconds / 60);
          subtime.textContent = `${minutesLeft} minute${minutesLeft === 1 ? "" : "s"} left`;
        }
      } else {
        const minutesFocused = Math.floor(elapsed / 60);
        subtime.textContent = `${minutesFocused} minute${minutesFocused === 1 ? "" : "s"} focused`;
      }

      startPause.textContent = running ? "Pause" : "Start";
      startMeta.textContent = sessionStartedAt
        ? `Started ${formatClockTime(sessionStartedAt)}`
        : "Start time will appear when the timer runs.";
      timerPanel.dataset.session = sessionStartedAt ? "active" : "idle";
      taskName.readOnly = Boolean(sessionStartedAt);
      document.title = `${displayTime} - Task Timer`;
    }

    function stopTimer() {
      running = false;
      window.clearInterval(timerId);
      timerId = null;
      updateDisplay();
    }

    function startTimer() {
      if (mode === "down") setGoalFromInput();
      if (mode === "down" && elapsed >= duration) elapsed = 0;
      if (!sessionStartedAt) sessionStartedAt = new Date().toISOString();
      running = true;
      timerId = window.setInterval(() => {
        elapsed += 1;
        updateDisplay();
      }, 1000);
      updateDisplay();
    }

    function recordSession() {
      if (elapsed <= 0) return;
      const endedAt = new Date().toISOString();
      const startedAt = sessionStartedAt || new Date(new Date(endedAt).getTime() - elapsed * 1000).toISOString();
      const entry = {
        id: crypto.randomUUID(),
        task: taskName.value.trim() || "Untitled task",
        mode,
        minutes: Math.max(1, Math.ceil(elapsed / 60)),
        startedAt,
        endedAt
      };
      completed = [entry, ...completed].slice(0, 300);
      selectedDate = new Date(entry.startedAt);
      saveLog();
      renderLog({ preserveScroll: true });
    }

    function finishSession() {
      if (elapsed <= 0) return;
      stopTimer();
      recordSession();
      elapsed = 0;
      sessionStartedAt = null;
      updateDisplay();
    }

    function renderLog(options = {}) {
      const previousTimeline = history.querySelector(".timeline");
      const previousScrollTop = previousTimeline ? previousTimeline.scrollTop : 0;
      const dayEntries = completed
        .filter((entry) => dateKey(entry.startedAt) === selectedDateKey())
        .sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      const daySchedules = scheduled
        .filter((entry) => dateKey(entry.startedAt) === selectedDateKey())
        .sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      const total = dayEntries.reduce((sum, entry) => sum + entry.minutes, 0);
      dateLabel.textContent = formatDateLabel(selectedDate);
      sessionCount.textContent = dayEntries.length;
      totalMinutes.textContent = total;

      const startHour = 0;
      const hourHeight = 42;
      const headerHeight = 26;
      const hourCount = 24;
      const gridRows = Array.from({ length: hourCount }, (_, index) => {
        const hour = startHour + index;
        const label = `${String(hour).padStart(2, "0")}:00`;
        return `
          <div class="hour-row">
            <div class="hour-label">${label}</div>
            <div class="hour-cell"></div>
          </div>
        `;
      }).join("");
      const positionItems = (items, type) => {
        const lanes = [];
        const positioned = items.map((entry) => {
          const start = minutesSinceMidnight(entry.startedAt);
          const end = start + entry.minutes;
          let lane = lanes.findIndex((laneEnd) => start >= laneEnd);
          if (lane === -1) {
            lane = lanes.length;
            lanes.push(end);
          } else {
            lanes[lane] = end;
          }
          return { ...entry, lane, type };
        });
        return {
          laneCount: Math.max(1, lanes.length),
          positioned
        };
      };
      const scheduleLayout = positionItems(daySchedules, "schedule");
      const finishedLayout = positionItems(dayEntries, "finished");
      const positionedEntries = [...scheduleLayout.positioned, ...finishedLayout.positioned]
        .sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      const blocks = positionedEntries.map((entry) => {
        const startMinutes = minutesSinceMidnight(entry.startedAt) - startHour * 60;
        const top = headerHeight + Math.max(0, (startMinutes / 60) * hourHeight);
        const height = Math.max((30 / 60) * hourHeight, (entry.minutes / 60) * hourHeight);
        const laneCount = entry.type === "schedule" ? scheduleLayout.laneCount : finishedLayout.laneCount;
        const laneWidth = `(100% - 74px) / ${laneCount * 2}`;
        const left = entry.type === "schedule"
          ? `calc(64px + (${laneWidth}) * ${entry.lane})`
          : `calc(64px + ((100% - 74px) / 2) + (${laneWidth}) * ${entry.lane})`;
        const right = entry.type === "schedule"
          ? `calc(10px + ((100% - 74px) / 2) + (${laneWidth}) * ${laneCount - entry.lane - 1})`
          : `calc(10px + (${laneWidth}) * ${laneCount - entry.lane - 1})`;
        const blockClass = entry.type === "schedule" ? "task-block schedule-block" : "task-block";
        return `
          <article class="${blockClass}" style="top: ${top}px; height: ${height}px; left: ${left}; right: ${right};" data-id="${entry.id}" data-type="${entry.type}">
            <div class="resize-handle resize-top" data-resize="start"></div>
            <strong>${escapeHtml(entry.task)}</strong>
            ${entry.note ? `<div class="block-note">${escapeHtml(entry.note)}</div>` : ""}
            <div class="resize-handle resize-bottom" data-resize="end"></div>
          </article>
        `;
      }).join("");
      const emptyHint = dayEntries.length || daySchedules.length ? "" : '<div class="timeline-hint">Drag on the timetable to plan a task.</div>';
      history.innerHTML = `
        <div class="timeline" style="--hour-height: ${hourHeight}px; --timeline-header-height: ${headerHeight}px;">
          <div class="timeline-columns" aria-hidden="true">
            <span>Plan</span>
            <span>Activity</span>
          </div>
          <div class="time-grid">${gridRows}</div>
          ${emptyHint}
          ${blocks}
        </div>
      `;
      if (options.preserveScroll) {
        const nextTimeline = history.querySelector(".timeline");
        if (nextTimeline) nextTimeline.scrollTop = previousScrollTop;
      }
      renderEditModal();
      syncSidePanelHeight();
    }

    function renderEditModal() {
      const finishedEntry = completed.find((item) => item.id === editingId);
      const scheduleEntry = scheduled.find((item) => item.id === editingId);
      const entry = finishedEntry || scheduleEntry;
      if (!entry) {
        editModal.hidden = true;
        editModal.innerHTML = "";
        editModal.style.left = "";
        editModal.style.top = "";
        editModal.style.right = "";
        return;
      }
      editModal.hidden = false;
      editModal.innerHTML = renderEditEntry(entry, scheduleEntry ? "schedule" : "finished");
      positionEditModal();
    }

    function setEditAnchorFromEvent(event) {
      editAnchor = { x: event.pageX, y: event.pageY };
    }

    function positionEditModal() {
      if (!editAnchor || editModal.hidden) {
        editModal.style.left = "";
        editModal.style.top = "";
        editModal.style.right = "";
        return;
      }
      const gap = 12;
      const margin = 16;
      const width = editModal.offsetWidth || 360;
      const height = Math.min(editModal.offsetHeight || 360, window.innerHeight - margin * 2);
      const minLeft = window.scrollX + margin;
      const maxLeft = window.scrollX + window.innerWidth - width - margin;
      const minTop = window.scrollY + margin;
      const maxTop = window.scrollY + window.innerHeight - height - margin;
      let left = editAnchor.x + gap;
      if (left > maxLeft) left = editAnchor.x - width - gap;
      left = Math.max(minLeft, Math.min(left, maxLeft));
      const top = Math.max(minTop, Math.min(editAnchor.y + gap, maxTop));
      editModal.style.left = `${left}px`;
      editModal.style.top = `${top}px`;
      editModal.style.right = "auto";
    }

    function renderEditEntry(entry, type) {
      const isSchedule = type === "schedule";
      return `
        <section class="edit-panel" data-id="${entry.id}">
          <div class="edit-panel-head">
            <div>
              <strong>${isSchedule ? "Edit schedule" : "Edit finished task"}</strong>
              <span>${isSchedule ? "Planned task" : entry.mode === "manual" ? "Manual activity log" : `${entry.mode === "up" ? "Count up" : "Countdown"} session`}</span>
            </div>
            <div class="duration">${entry.minutes} min</div>
          </div>
          <form class="edit-form" data-id="${entry.id}" data-type="${type}">
            <div class="full">
              <label for="edit-task-${entry.id}">Task</label>
              <input id="edit-task-${entry.id}" name="task" type="text" value="${escapeAttr(entry.task)}">
            </div>
            <div>
              <label for="edit-start-${entry.id}">Start time</label>
              <input id="edit-start-${entry.id}" name="startedAt" type="datetime-local" value="${toDateTimeLocal(entry.startedAt)}">
            </div>
            <div>
              <label for="edit-minutes-${entry.id}">Minutes</label>
              <input id="edit-minutes-${entry.id}" name="minutes" type="number" min="1" max="1440" value="${entry.minutes}">
            </div>
            <div class="full">
              <label>Calculated finish</label>
              <div class="finish-preview" data-finish-preview>${formatClockTime(entry.endedAt)}</div>
            </div>
            <div class="full">
              <label for="edit-note-${entry.id}">Note</label>
              <textarea id="edit-note-${entry.id}" name="note" rows="3">${escapeHtml(entry.note || "")}</textarea>
            </div>
            <div class="edit-buttons">
              <button class="small-button danger" type="button" data-action="delete" data-id="${entry.id}">Delete</button>
              <button class="small-button" type="button" data-action="cancel" data-id="${entry.id}">Cancel</button>
              <button class="small-button primary" type="submit">Save</button>
            </div>
          </form>
        </section>
      `;
    }

    function loadSavedLog() {
      try {
        const saved = JSON.parse(localStorage.getItem("taskTimerLog") || "[]");
        return Array.isArray(saved) ? saved.map(normalizeEntry) : [];
      } catch {
        return [];
      }
    }

    function loadSavedSchedule() {
      try {
        const saved = JSON.parse(localStorage.getItem("taskTimerSchedule") || "[]");
        return Array.isArray(saved) ? saved.map(normalizeSchedule) : [];
      } catch {
        return [];
      }
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function timelineMinuteFromEvent(event, timeline) {
      const hourHeight = Number.parseFloat(getComputedStyle(timeline).getPropertyValue("--hour-height")) || 42;
      const headerHeight = Number.parseFloat(getComputedStyle(timeline).getPropertyValue("--timeline-header-height")) || 0;
      const rect = timeline.getBoundingClientRect();
      const rawMinutes = ((event.clientY - rect.top + timeline.scrollTop - headerHeight) / hourHeight) * 60;
      return Math.max(0, Math.min(1440, Math.round(rawMinutes / 15) * 15));
    }

    function timelineDragTypeFromEvent(event, timeline) {
      const rect = timeline.getBoundingClientRect();
      const taskAreaLeft = rect.left + 64;
      const taskAreaRight = rect.right - 10;
      const taskAreaCenter = taskAreaLeft + (taskAreaRight - taskAreaLeft) / 2;
      return event.clientX >= taskAreaCenter ? "finished" : "schedule";
    }

    function renderScheduleDraft(timeline, startMinute, endMinute, type) {
      const existing = timeline.querySelector(".schedule-draft");
      if (existing) existing.remove();
      const topMinute = Math.min(startMinute, endMinute);
      const minutes = Math.max(15, Math.abs(endMinute - startMinute));
      const hourHeight = Number.parseFloat(getComputedStyle(timeline).getPropertyValue("--hour-height")) || 42;
      const headerHeight = Number.parseFloat(getComputedStyle(timeline).getPropertyValue("--timeline-header-height")) || 0;
      const draft = document.createElement("div");
      draft.className = type === "finished" ? "schedule-draft activity-draft" : "schedule-draft";
      draft.style.top = `${headerHeight + (topMinute / 60) * hourHeight}px`;
      draft.style.height = `${Math.max((30 / 60) * hourHeight, (minutes / 60) * hourHeight)}px`;
      draft.textContent = `${minutes} min`;
      timeline.append(draft);
    }

    function clearScheduleDraft() {
      history.querySelector(".schedule-draft")?.remove();
    }

    function cancelScheduleDrag() {
      scheduleDrag = null;
      clearScheduleDraft();
    }

    function findTimelineEntry(id) {
      const scheduleEntry = scheduled.find((entry) => entry.id === id);
      if (scheduleEntry) return { entry: scheduleEntry, type: "schedule" };
      const finishedEntry = completed.find((entry) => entry.id === id);
      if (finishedEntry) return { entry: finishedEntry, type: "finished" };
      return null;
    }

    function updateTimelineEntry(id, type, updates) {
      const applyUpdate = (entry) => entry.id === id ? { ...entry, ...updates } : entry;
      if (type === "schedule") {
        scheduled = scheduled.map(applyUpdate);
        saveSchedule();
      } else {
        completed = completed.map(applyUpdate);
        saveLog();
      }
    }

    function discardPendingCreatedEntry(id = editingId) {
      if (!pendingCreatedEntry || pendingCreatedEntry.id !== id) return false;
      if (pendingCreatedEntry.type === "schedule") {
        scheduled = scheduled.filter((entry) => entry.id !== id);
        saveSchedule();
      } else {
        completed = completed.filter((entry) => entry.id !== id);
        saveLog();
      }
      pendingCreatedEntry = null;
      if (editingId === id) editingId = null;
      editAnchor = null;
      return true;
    }

    function startBlockResize(event) {
      const handle = event.target.closest("[data-resize]");
      if (!handle || event.button !== 0) return false;
      const block = handle.closest(".task-block");
      const timeline = block?.closest(".timeline");
      const found = block ? findTimelineEntry(block.dataset.id) : null;
      if (!block || !timeline || !found) return false;
      const startMinute = minutesSinceMidnight(found.entry.startedAt);
      const endMinute = Math.min(1440, startMinute + found.entry.minutes);
      resizeDrag = {
        block,
        timeline,
        id: block.dataset.id,
        type: found.type,
        edge: handle.dataset.resize,
        startMinute,
        endMinute
      };
      block.classList.add("resizing");
      timeline.setPointerCapture(event.pointerId);
      event.preventDefault();
      return true;
    }

    function startBlockMove(event) {
      if (event.button !== 0 || event.target.closest("[data-resize]")) return false;
      const block = event.target.closest(".task-block");
      const timeline = block?.closest(".timeline");
      const found = block ? findTimelineEntry(block.dataset.id) : null;
      if (!block || !timeline || !found) return false;
      const startMinute = minutesSinceMidnight(found.entry.startedAt);
      const durationMinutes = Math.max(15, Number.parseInt(found.entry.minutes, 10) || 15);
      moveDrag = {
        block,
        timeline,
        id: block.dataset.id,
        type: found.type,
        anchorMinute: timelineMinuteFromEvent(event, timeline),
        anchorPageX: event.pageX,
        anchorPageY: event.pageY,
        originalStartMinute: startMinute,
        nextStartMinute: startMinute,
        durationMinutes,
        active: false
      };
      return true;
    }

    function previewBlockResize(event) {
      if (!resizeDrag) return;
      const minute = timelineMinuteFromEvent(event, resizeDrag.timeline);
      if (resizeDrag.edge === "start") {
        resizeDrag.startMinute = Math.min(Math.max(0, minute), resizeDrag.endMinute - 15);
      } else {
        resizeDrag.endMinute = Math.max(Math.min(1440, minute), resizeDrag.startMinute + 15);
      }
      const hourHeight = Number.parseFloat(getComputedStyle(resizeDrag.timeline).getPropertyValue("--hour-height")) || 42;
      const headerHeight = Number.parseFloat(getComputedStyle(resizeDrag.timeline).getPropertyValue("--timeline-header-height")) || 0;
      const top = headerHeight + (resizeDrag.startMinute / 60) * hourHeight;
      const height = Math.max((30 / 60) * hourHeight, ((resizeDrag.endMinute - resizeDrag.startMinute) / 60) * hourHeight);
      resizeDrag.block.style.top = `${top}px`;
      resizeDrag.block.style.height = `${height}px`;
    }

    function finishBlockResize() {
      if (!resizeDrag) return;
      const startedAt = isoForSelectedDayMinute(resizeDrag.startMinute);
      const minutes = Math.max(15, resizeDrag.endMinute - resizeDrag.startMinute);
      updateTimelineEntry(resizeDrag.id, resizeDrag.type, {
        startedAt,
        endedAt: addMinutesToIso(startedAt, minutes),
        minutes
      });
      resizeDrag.block.classList.remove("resizing");
      resizeDrag = null;
      suppressBlockClick = true;
      renderLog({ preserveScroll: true });
      window.setTimeout(() => {
        suppressBlockClick = false;
      }, 0);
    }

    function previewBlockMove(event) {
      if (!moveDrag) return;
      const movedPixels = Math.hypot(event.pageX - moveDrag.anchorPageX, event.pageY - moveDrag.anchorPageY);
      if (!moveDrag.active) {
        if (movedPixels < moveDragThreshold) return;
        moveDrag.active = true;
        moveDrag.block.classList.add("moving");
        try {
          moveDrag.block.setPointerCapture(event.pointerId);
        } catch (error) {
          // Some browsers reject delayed pointer capture; dragging still works inside the timeline.
        }
      }
      const currentMinute = timelineMinuteFromEvent(event, moveDrag.timeline);
      const delta = currentMinute - moveDrag.anchorMinute;
      const maxStart = Math.max(0, 1440 - moveDrag.durationMinutes);
      moveDrag.nextStartMinute = Math.max(0, Math.min(maxStart, moveDrag.originalStartMinute + delta));
      const hourHeight = Number.parseFloat(getComputedStyle(moveDrag.timeline).getPropertyValue("--hour-height")) || 42;
      const headerHeight = Number.parseFloat(getComputedStyle(moveDrag.timeline).getPropertyValue("--timeline-header-height")) || 0;
      moveDrag.block.style.top = `${headerHeight + (moveDrag.nextStartMinute / 60) * hourHeight}px`;
      event.preventDefault();
    }

    function finishBlockMove() {
      if (!moveDrag) return;
      const didMove = moveDrag.active && moveDrag.nextStartMinute !== moveDrag.originalStartMinute;
      const movedBlock = moveDrag.block;
      const shouldSuppressClick = moveDrag.active;
      if (didMove) {
        const startedAt = isoForSelectedDayMinute(moveDrag.nextStartMinute);
        updateTimelineEntry(moveDrag.id, moveDrag.type, {
          startedAt,
          endedAt: addMinutesToIso(startedAt, moveDrag.durationMinutes)
        });
      }
      movedBlock.classList.remove("moving");
      moveDrag = null;
      if (shouldSuppressClick) {
        suppressBlockClick = true;
      }
      if (didMove) {
        renderLog({ preserveScroll: true });
      }
      if (shouldSuppressClick) {
        window.setTimeout(() => {
          suppressBlockClick = false;
        }, 0);
      }
    }

    function createEntryFromDrag() {
      if (!scheduleDrag?.active) return;
      const startMinute = Math.min(1425, Math.min(scheduleDrag.startMinute, scheduleDrag.endMinute));
      const endMinute = Math.max(scheduleDrag.startMinute, scheduleDrag.endMinute);
      const minutes = Math.max(15, endMinute - startMinute);
      const cappedMinutes = Math.min(minutes, 1440 - startMinute);
      const startedAt = isoForSelectedDayMinute(startMinute);
      if (scheduleDrag.type === "finished") {
        const entry = normalizeEntry({
          id: crypto.randomUUID(),
          task: "Activity log",
          mode: "manual",
          minutes: cappedMinutes,
          startedAt,
          endedAt: addMinutesToIso(startedAt, cappedMinutes)
        });
        completed = [entry, ...completed].slice(0, 300);
        editingId = entry.id;
        pendingCreatedEntry = { id: entry.id, type: "finished" };
        editAnchor = scheduleDrag.anchor;
        saveLog();
        renderLog({ preserveScroll: true });
        return;
      }
      const entry = normalizeSchedule({
        id: crypto.randomUUID(),
        task: "Planned task",
        minutes: cappedMinutes,
        startedAt,
        endedAt: addMinutesToIso(startedAt, cappedMinutes)
      });
      scheduled = [...scheduled, entry].sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      editingId = entry.id;
      pendingCreatedEntry = { id: entry.id, type: "schedule" };
      editAnchor = scheduleDrag.anchor;
      saveSchedule();
      renderLog({ preserveScroll: true });
    }

    startPause.addEventListener("click", () => {
      if (running) {
        stopTimer();
      } else {
        startTimer();
      }
    });

    resetButton.addEventListener("click", () => {
      stopTimer();
      duration = clampMinutes(minutesInput.value) * 60;
      elapsed = 0;
      sessionStartedAt = null;
      updateDisplay();
    });

    finishButton.addEventListener("click", finishSession);

    minutesInput.addEventListener("change", () => {
      if (!running) {
        duration = clampMinutes(minutesInput.value) * 60;
        if (mode === "down") elapsed = Math.min(elapsed, duration);
        updateDisplay();
      }
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    window.addEventListener("resize", () => {
      lockedTimerPanelHeight = null;
      syncSidePanelHeight();
      positionEditModal();
    });

    exportCsv.addEventListener("click", exportHistoryCsv);
    importCsv.addEventListener("click", () => csvFile.click());
    csvFile.addEventListener("change", () => importHistoryCsv(csvFile.files[0]));

    prevDay.addEventListener("click", () => changeSelectedDate(-1));
    nextDay.addEventListener("click", () => changeSelectedDate(1));

    history.addEventListener("click", (event) => {
      if (suppressBlockClick || event.target.closest("[data-resize]")) return;
      const block = event.target.closest(".task-block");
      if (!block) return;
      editingId = block.dataset.id;
      setEditAnchorFromEvent(event);
      renderEditModal();
      syncSidePanelHeight();
    });

    history.addEventListener("pointerdown", (event) => {
      if (startBlockResize(event)) return;
      if (startBlockMove(event)) return;
      if (event.button !== 0 || event.target.closest(".task-block, button")) return;
      const timeline = event.target.closest(".timeline");
      if (!timeline) return;
      const startMinute = timelineMinuteFromEvent(event, timeline);
      const type = timelineDragTypeFromEvent(event, timeline);
      scheduleDrag = {
        timeline,
        type,
        anchor: { x: event.pageX, y: event.pageY },
        anchorPageX: event.pageX,
        anchorPageY: event.pageY,
        startMinute,
        endMinute: Math.min(1440, startMinute + 15),
        active: false
      };
      timeline.setPointerCapture(event.pointerId);
    });

    history.addEventListener("pointermove", (event) => {
      if (resizeDrag) {
        previewBlockResize(event);
        return;
      }
      if (moveDrag) {
        previewBlockMove(event);
        return;
      }
      if (!scheduleDrag) return;
      const movedPixels = Math.hypot(event.pageX - scheduleDrag.anchorPageX, event.pageY - scheduleDrag.anchorPageY);
      if (!scheduleDrag.active) {
        if (movedPixels < createDragThreshold) return;
        scheduleDrag.active = true;
      }
      scheduleDrag.anchor = { x: event.pageX, y: event.pageY };
      scheduleDrag.endMinute = timelineMinuteFromEvent(event, scheduleDrag.timeline);
      renderScheduleDraft(scheduleDrag.timeline, scheduleDrag.startMinute, scheduleDrag.endMinute, scheduleDrag.type);
    });

    history.addEventListener("pointerup", () => {
      if (resizeDrag) {
        finishBlockResize();
        return;
      }
      if (moveDrag) {
        finishBlockMove();
        return;
      }
      if (!scheduleDrag) return;
      clearScheduleDraft();
      createEntryFromDrag();
      scheduleDrag = null;
    });

    history.addEventListener("pointercancel", () => {
      if (resizeDrag) {
        resizeDrag.block.classList.remove("resizing");
        resizeDrag = null;
      }
      if (moveDrag) {
        moveDrag.block.classList.remove("moving");
        moveDrag = null;
      }
      cancelScheduleDrag();
    });

    editModal.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      if (action === "cancel") {
        if (!discardPendingCreatedEntry(id)) {
          editingId = null;
          editAnchor = null;
        }
      }
      if (action === "delete") {
        completed = completed.filter((entry) => entry.id !== id);
        scheduled = scheduled.filter((entry) => entry.id !== id);
        if (pendingCreatedEntry?.id === id) pendingCreatedEntry = null;
        if (editingId === id) editingId = null;
        editAnchor = null;
        saveLog();
        saveSchedule();
      }
      renderLog({ preserveScroll: true });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (scheduleDrag) {
        cancelScheduleDrag();
        return;
      }
      if (editModal.hidden) return;
      if (discardPendingCreatedEntry(editingId)) {
        renderLog({ preserveScroll: true });
        syncSidePanelHeight();
        return;
      }
      editingId = null;
      editAnchor = null;
      renderEditModal();
      syncSidePanelHeight();
    });

    editModal.addEventListener("input", (event) => {
      const form = event.target.closest(".edit-form");
      if (!form || !["startedAt", "minutes"].includes(event.target.name)) return;
      const start = form.elements.startedAt.value;
      const minutes = form.elements.minutes.value;
      const preview = form.querySelector("[data-finish-preview]");
      if (!start || !minutes || !preview) return;
      preview.textContent = formatClockTime(addMinutesToIso(start, minutes));
    });

    editModal.addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.target.closest(".edit-form");
      if (!form) return;
      const id = form.dataset.id;
      const type = form.dataset.type;
      const nextStartedAt = fromDateTimeLocal(form.elements.startedAt.value);
      const nextMinutes = Math.max(1, Number.parseInt(form.elements.minutes.value, 10) || 1);
      const updateEntry = (entry) => entry.id === id
        ? {
            ...entry,
            task: form.elements.task.value.trim() || "Untitled task",
            note: form.elements.note.value.trim(),
            startedAt: nextStartedAt,
            endedAt: addMinutesToIso(nextStartedAt, nextMinutes),
            minutes: nextMinutes
          }
        : entry;
      if (type === "schedule") {
        scheduled = scheduled.map(updateEntry);
        saveSchedule();
      } else {
        completed = completed.map(updateEntry);
        saveLog();
      }
      selectedDate = new Date(nextStartedAt);
      if (pendingCreatedEntry?.id === id) pendingCreatedEntry = null;
      editingId = null;
      editAnchor = null;
      renderLog({ preserveScroll: true });
    });

    updateDisplay();
    renderLog();
    syncSidePanelHeight();
  </script>
</body>
</html>
